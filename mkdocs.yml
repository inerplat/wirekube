site_name: WireKube
site_url: https://inerplat.github.io/wirekube/
site_description: Serverless P2P WireGuard Mesh VPN for Kubernetes
repo_url: https://github.com/inerplat/wirekube
repo_name: inerplat/wirekube

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - NAT Traversal: architecture/nat-traversal.md
    - Relay System: architecture/relay.md
    - Virtual Gateway: architecture/gateway.md
    - CNI Compatibility: architecture/cni-compatibility.md
  - Operations:
    - Deployment Topologies: operations/topologies.md
    - Monitoring: operations/monitoring.md
    - Troubleshooting: operations/troubleshooting.md
  - Reference:
    - CRD Reference: reference/crds.md
    - CLI Reference: reference/cli.md
    - Cloud Providers: reference/cloud-providers.md
  - Development:
    - Building: development/building.md
