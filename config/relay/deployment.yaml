---
# wirekube-relay ServiceAccount + RBAC
#
# The relay process itself needs no Kubernetes permissions. The admin-web
# sidecar uses this ServiceAccount to list, issue, and delete
# WireKubeExternalPeer resources from a localhost-only web UI, and stores
# generated client configs in namespaced Secrets.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wirekube-relay
  namespace: wirekube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wirekube-relay
rules:
- apiGroups:
  - wirekube.io
  resources:
  - wirekubeexternalpeers
  verbs:
  - get
  - list
  - create
  - delete
- apiGroups:
  - wirekube.io
  resources:
  - wirekubepeers
  - wirekubemeshes
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wirekube-relay-admin-web
  namespace: wirekube-system
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  - services
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wirekube-relay-admin-web
  namespace: wirekube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wirekube-relay-admin-web
subjects:
- kind: ServiceAccount
  name: wirekube-relay
  namespace: wirekube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wirekube-relay
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wirekube-relay
subjects:
- kind: ServiceAccount
  name: wirekube-relay
  namespace: wirekube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wirekube-relay
  namespace: wirekube-system
  labels:
    app.kubernetes.io/name: wirekube-relay
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: wirekube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wirekube-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wirekube-relay
        app.kubernetes.io/component: relay
    spec:
      serviceAccountName: wirekube-relay
      nodeSelector:
        eks.amazonaws.com/nodegroup: relay-ng
      containers:
        - name: relay
          image: inerplat/wirekube:v0.0.0-dev.14
          command: ["wirekube-relay"]
          args:
            - --addr=:3478
            - --external-wg-addr=:3478
          ports:
            - name: relay-tcp
              containerPort: 3478
              protocol: TCP
            - name: relay-udp
              containerPort: 3478
              protocol: UDP
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -z 127.0.0.1 3478"]
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "nc -z 127.0.0.1 3478"]
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
        - name: admin-web
          image: inerplat/wirekube:v0.0.0-dev.14
          command: ["wirekube-admin-web"]
          args:
            # Binds to loopback only: the console is reachable via
            # `kubectl port-forward` and is NOT exposed by either Service
            # below. It ships with authentication DISABLED. Before exposing
            # port 8080 (Ingress / NodePort / extra Service), you MUST enable
            # HTTP Basic Auth by uncommenting the envFrom block below so the
            # peer-management console (which can download private keys) is not
            # left open.
            - --addr=127.0.0.1:8080
          # envFrom:
          #   # Create with:
          #   #   HASH=$(htpasswd -bnBC 10 "" 's3cret' | tr -d ':\n' | sed 's/^\$2y/\$2a/')
          #   #   kubectl -n wirekube-system create secret generic wirekube-admin-web-auth \
          #   #     --from-literal=WIREKUBE_ADMIN_WEB_USERNAME=admin \
          #   #     --from-literal=WIREKUBE_ADMIN_WEB_PASSWORD_HASH="$HASH"
          #   - secretRef:
          #       name: wirekube-admin-web-auth
          ports:
            - name: admin-web
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wirekube-relay-control
  namespace: wirekube-system
  labels:
    app.kubernetes.io/name: wirekube-relay
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: wirekube
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: wirekube-relay
  ports:
    - name: relay-control
      port: 3478
      targetPort: 3478
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wirekube-relay
  namespace: wirekube-system
  labels:
    app.kubernetes.io/name: wirekube-relay
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: wirekube
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: wirekube-relay
  ports:
    - name: relay
      port: 3478
      targetPort: 3478
      protocol: TCP
    - name: relay-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
