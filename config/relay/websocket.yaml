apiVersion: apps/v1
kind: Deployment
metadata:
  name: wirekube-relay-ws
  namespace: wirekube-system
  labels:
    app.kubernetes.io/name: wirekube-relay-ws
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: wirekube
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wirekube-relay-ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wirekube-relay-ws
        app.kubernetes.io/component: relay
    spec:
      serviceAccountName: wirekube-relay
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: wirekube-relay-ws
              topologyKey: kubernetes.io/hostname
      containers:
        - name: relay-ws
          image: inerplat/wirekube:v0.0.0-dev.14
          command: ["wirekube-relay-ws"]
          args:
            - --addr=:8081
            - --backend-addr=wirekube-relay.wirekube-system.svc.cluster.local:3478
            - --path=/relay
            - --audience=wirekube-relay
            - --agent-service-account=wirekube-system/wirekube-agent
          ports:
            - name: relay-ws
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wirekube-relay-ws
  namespace: wirekube-system
  labels:
    app.kubernetes.io/name: wirekube-relay-ws
    app.kubernetes.io/component: relay
    app.kubernetes.io/part-of: wirekube
spec:
  selector:
    app.kubernetes.io/name: wirekube-relay-ws
  ports:
    - name: http-websocket
      port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wirekube-relay-ws
  namespace: wirekube-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wirekube-relay-ws
