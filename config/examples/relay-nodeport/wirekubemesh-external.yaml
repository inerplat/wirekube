---
# Use this shape when an agent cannot use the managed relay's cluster-local control Service.
# Replace both endpoints with a reachable cluster node address.
apiVersion: wirekube.io/v1alpha1
kind: WireKubeMesh
metadata:
  name: default
spec:
  listenPort: 51820
  interfaceName: wire_kube
  mtu: 1420
  stunServers:
    - stun.cloudflare.com:3478
    - stun.l.google.com:19302
  relay:
    mode: auto
    provider: external
    external:
      endpoint: "REPLACE_WITH_PUBLIC_NODE_IP:30479"
      controlEndpoint: "REPLACE_WITH_PUBLIC_NODE_IP:30478"
      transport: tcp
    handshakeTimeoutSeconds: 30
    directRetryIntervalSeconds: 120
