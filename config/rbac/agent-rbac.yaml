---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wirekube-agent
  namespace: wirekube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wirekube-agent
rules:
  # Read all peers (to build WireGuard peer config)
  - apiGroups: [wirekube.io]
    resources: [wirekubepeers]
    verbs: [get, list, watch]
  # Update own peer (public key, endpoint, status)
  - apiGroups: [wirekube.io]
    resources: [wirekubepeers]
    verbs: [update, patch]
  - apiGroups: [wirekube.io]
    resources: [wirekubepeers/status]
    verbs: [get, update, patch]
  # Read mesh config
  - apiGroups: [wirekube.io]
    resources: [wirekubemeshes]
    verbs: [get, list, watch]
  # Read own node (for endpoint discovery)
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wirekube-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wirekube-agent
subjects:
  - kind: ServiceAccount
    name: wirekube-agent
    namespace: wirekube-system
