---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: wirekubepeers.wirekube.io
spec:
  group: wirekube.io
  names:
    kind: WireKubePeer
    listKind: WireKubePeerList
    plural: wirekubepeers
    shortNames:
    - wkpeer
    singular: wirekubepeer
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.endpoint
      name: Endpoint
      type: string
    - jsonPath: .spec.allowedIPs
      name: AllowedIPs
      type: string
    - jsonPath: .status.connected
      name: Connected
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WireKubePeer represents a WireGuard peer in the mesh.
          Each cluster node has one auto-managed peer (created by the agent).
          External peers (home PCs, remote VMs) are created manually by the user.
          The AllowedIPs field works like site-to-site VPN routing: traffic destined
          for these CIDRs will be routed through this peer's WireGuard tunnel.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WireKubePeerSpec defines the desired state of WireKubePeer
            properties:
              allowedIPs:
                description: |-
                  AllowedIPs is the list of CIDR ranges whose traffic will be routed through
                  this peer's WireGuard tunnel. Defined by the user — similar to site-to-site VPN.
                  Example: ["10.10.0.0/16", "192.168.1.0/24", "172.16.0.5/32"]
                items:
                  type: string
                type: array
              endpoint:
                description: |-
                  Endpoint is the WireGuard endpoint address (host:port).
                  Must be a publicly reachable address. For NAT'd nodes this is the public IP:port.
                  Automatically discovered by the agent via STUN/cloud-metadata.
                  Can be overridden via the wirekube.io/endpoint node annotation.
                type: string
              persistentKeepalive:
                default: 25
                description: |-
                  PersistentKeepalive specifies the keepalive interval in seconds.
                  Recommended value is 25 for peers behind NAT. Set to 0 to disable.
                format: int32
                maximum: 65535
                minimum: 0
                type: integer
              publicKey:
                description: |-
                  PublicKey is the WireGuard public key of this peer (base64 encoded).
                  Automatically set by the agent on the node this peer represents.
                  For manually created peers (external nodes, home PCs), set this explicitly.
                type: string
            type: object
          status:
            description: WireKubePeerStatus defines the observed state of WireKubePeer
            properties:
              bytesReceived:
                description: BytesReceived is the number of bytes received from this
                  peer.
                format: int64
                type: integer
              bytesSent:
                description: BytesSent is the number of bytes sent to this peer.
                format: int64
                type: integer
              conditions:
                description: Conditions reflect the current state of the peer.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connected:
                description: Connected indicates whether this peer has an active WireGuard
                  handshake.
                type: boolean
              endpointDiscoveryMethod:
                description: |-
                  EndpointDiscoveryMethod records how the endpoint was discovered.
                  One of: manual, annotation, stun, aws-metadata, internal-ip
                type: string
              lastHandshake:
                description: LastHandshake is the timestamp of the most recent WireGuard
                  handshake.
                format: date-time
                type: string
              relayLatencyMs:
                description: |-
                  RelayLatencyMs is the measured latency to this peer via relay, in milliseconds.
                  Only set when TransportMode is "relay".
                format: int32
                type: integer
              transportMode:
                description: |-
                  TransportMode indicates the current transport path to this peer.
                  "direct": WireGuard P2P connection using discovered endpoint.
                  "relay": traffic routed through a relay server.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
