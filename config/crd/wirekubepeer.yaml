---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wirekubepeers.wirekube.io
spec:
  group: wirekube.io
  names:
    kind: WireKubePeer
    listKind: WireKubePeerList
    plural: wirekubepeers
    singular: wirekubepeer
    shortNames:
      - wkpeer
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Connected
          type: boolean
          jsonPath: .status.connected
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                publicKey:
                  type: string
                  description: WireGuard public key (base64). Auto-set by agent; set manually for external peers.
                endpoint:
                  type: string
                  description: "WireGuard endpoint (host:port). Must be publicly reachable."
                allowedIPs:
                  type: array
                  items:
                    type: string
                  description: "CIDRs routed through this peer's tunnel (site-to-site VPN style). User-defined."
                persistentKeepalive:
                  type: integer
                  default: 25
                  minimum: 0
                  maximum: 65535
                  description: Keepalive interval in seconds. Recommended 25 for NAT nodes.
            status:
              type: object
              properties:
                connected:
                  type: boolean
                lastHandshake:
                  type: string
                  format: date-time
                bytesReceived:
                  type: integer
                  format: int64
                bytesSent:
                  type: integer
                  format: int64
                endpointDiscoveryMethod:
                  type: string
                  description: "How endpoint was discovered: annotation|ipv6|stun|aws-metadata|internal-ip"
                transportMode:
                  type: string
                  description: "Current transport: direct|relay"
                relayLatencyMs:
                  type: integer
                  description: Latency to peer via relay (ms). Set when transportMode is relay.
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
