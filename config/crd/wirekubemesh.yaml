---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wirekubemeshes.wirekube.io
spec:
  group: wirekube.io
  names:
    kind: WireKubeMesh
    listKind: WireKubeMeshList
    plural: wirekubemeshes
    singular: wirekubemesh
    shortNames:
      - wkmesh
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ListenPort
          type: integer
          jsonPath: .spec.listenPort
        - name: ReadyPeers
          type: integer
          jsonPath: .status.readyPeers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                listenPort:
                  type: integer
                  default: 51820
                  minimum: 1024
                  maximum: 65535
                  description: WireGuard listen port
                interfaceName:
                  type: string
                  default: wire_kube
                  description: WireGuard interface name
                mtu:
                  type: integer
                  default: 1420
                  minimum: 576
                  maximum: 65535
                  description: MTU for the WireGuard interface
                stunServers:
                  type: array
                  items:
                    type: string
                  description: STUN server URIs for NAT traversal endpoint discovery
                apiServerURL:
                  type: string
                  description: >-
                    URL of the Kubernetes API server (e.g. "https://10.0.0.1:6443").
                    When set, the agent uses this directly. When empty, the agent
                    falls back to in-cluster service account discovery.
                relay:
                  type: object
                  description: Relay fallback for peers behind Symmetric NAT.
                  required:
                    - provider
                  properties:
                    mode:
                      type: string
                      default: auto
                      enum: [auto, always, never]
                      description: >-
                        "auto": direct P2P first, relay on timeout.
                        "always": always relay. "never": disable relay.
                    provider:
                      type: string
                      enum: [external, managed]
                      description: >-
                        "external": user provides relay endpoint.
                        "managed": operator deploys relay as Pod + LB.
                    external:
                      type: object
                      description: User-provided relay server configuration.
                      required:
                        - endpoint
                      properties:
                        endpoint:
                          type: string
                          description: "Relay address (host:port), e.g. relay.example.com:3478"
                        transport:
                          type: string
                          default: tcp
                          enum: [tcp, ws]
                          description: Protocol to connect to relay.
                        authSecretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                    managed:
                      type: object
                      description: Operator-managed relay (Pod + LoadBalancer).
                      properties:
                        replicas:
                          type: integer
                          default: 1
                          minimum: 1
                        serviceType:
                          type: string
                          default: LoadBalancer
                          enum: [LoadBalancer, NodePort]
                        port:
                          type: integer
                          default: 3478
                          minimum: 1
                          maximum: 65535
                        image:
                          type: string
                        resources:
                          type: object
                          properties:
                            cpuRequest:
                              type: string
                            memoryRequest:
                              type: string
                            cpuLimit:
                              type: string
                            memoryLimit:
                              type: string
                    handshakeTimeoutSeconds:
                      type: integer
                      default: 30
                      minimum: 5
                      maximum: 300
                      description: Seconds to wait for direct handshake before relay fallback.
                    directRetryIntervalSeconds:
                      type: integer
                      default: 120
                      minimum: 30
                      description: Seconds between re-attempts to upgrade from relay to direct P2P.
            status:
              type: object
              properties:
                readyPeers:
                  type: integer
                  description: Number of peers with active WireGuard handshake
                totalPeers:
                  type: integer
                  description: Total number of WireKubePeer resources
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
