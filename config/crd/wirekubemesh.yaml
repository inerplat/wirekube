---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wirekubemeshes.wirekube.io
spec:
  group: wirekube.io
  names:
    kind: WireKubeMesh
    listKind: WireKubeMeshList
    plural: wirekubemeshes
    singular: wirekubemesh
    shortNames:
      - wkmesh
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ListenPort
          type: integer
          jsonPath: .spec.listenPort
        - name: ReadyPeers
          type: integer
          jsonPath: .status.readyPeers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                listenPort:
                  type: integer
                  default: 51820
                  minimum: 1024
                  maximum: 65535
                  description: WireGuard listen port
                interfaceName:
                  type: string
                  default: wg0
                  description: WireGuard interface name
                mtu:
                  type: integer
                  default: 1420
                  minimum: 576
                  maximum: 65535
                  description: MTU for the WireGuard interface
                stunServers:
                  type: array
                  items:
                    type: string
                  description: STUN server URIs for NAT traversal endpoint discovery
            status:
              type: object
              properties:
                readyPeers:
                  type: integer
                  description: Number of peers with active WireGuard handshake
                totalPeers:
                  type: integer
                  description: Total number of WireKubePeer resources
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
