---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wirekubegateways.wirekube.io
spec:
  group: wirekube.io
  names:
    kind: WireKubeGateway
    listKind: WireKubeGatewayList
    plural: wirekubegateways
    singular: wirekubegateway
    shortNames:
      - wkgw
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: PodIP
          type: string
          jsonPath: .status.podIP
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - nodeName
                - routedCIDRs
              properties:
                nodeName:
                  type: string
                  description: VPN node where the gateway pod runs
                routedCIDRs:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  description: Pod/node CIDRs of non-VPN nodes to route through this gateway
                masqueradeEnabled:
                  type: boolean
                  default: true
                  description: Enable SNAT so mesh nodes see gateway's mesh IP as source
            status:
              type: object
              properties:
                ready:
                  type: boolean
                podName:
                  type: string
                podIP:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
