---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wirekube-agent
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wirekube-agent
rules:
  - apiGroups: ["wirekube.io"]
    resources: ["wirekubepeers"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["wirekube.io"]
    resources: ["wirekubepeers/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["wirekube.io"]
    resources: ["wirekubemeshes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wirekube-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wirekube-agent
subjects:
  - kind: ServiceAccount
    name: wirekube-agent
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wirekube-agent
  namespace: kube-system
  labels:
    app: wirekube-agent
spec:
  selector:
    matchLabels:
      app: wirekube-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: wirekube-agent
    spec:
      serviceAccountName: wirekube-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: cleanup
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              IFACE="${WIREKUBE_INTERFACE:-wire_kube}"
              if ip link show "$IFACE" >/dev/null 2>&1; then
                echo "cleaning up stale $IFACE routes and interface"
                ip route flush dev "$IFACE" 2>/dev/null
                ip link delete "$IFACE"
              fi
              # Clean up stale ip rules from previous agent runs (crash/OOMKill)
              ip rule del prio 100 fwmark 0x574b 2>/dev/null || true
              ip rule del prio 200 table 22347 2>/dev/null || true
              ip route flush table 22347 2>/dev/null || true
          env:
            - name: WIREKUBE_INTERFACE
              value: "wire_kube"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            limits:
              cpu: 50m
              memory: 16Mi
      containers:
        - name: agent
          image: inerplat/wirekube:latest
          command: ["wirekube-agent"]
          args:
            - --node-name=$(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WIREKUBE_INTERFACE
              value: "wire_kube"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
          volumeMounts:
            - name: wireguard-keys
              mountPath: /var/lib/wirekube
            - name: host-proc-sys-net
              mountPath: /host/proc/sys/net
          resources:
            limits:
              cpu: 200m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: wireguard-keys
          hostPath:
            path: /var/lib/wirekube
            type: DirectoryOrCreate
        - name: host-proc-sys-net
          hostPath:
            path: /proc/sys/net
            type: Directory
