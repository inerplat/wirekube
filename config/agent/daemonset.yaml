---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wirekube-agent
  namespace: wirekube-system
  labels:
    app: wirekube-agent
spec:
  selector:
    matchLabels:
      app: wirekube-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: wirekube-agent
    spec:
      serviceAccountName: wirekube-agent
      hostNetwork: true
      dnsPolicy: Default
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: cleanup
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              IFACE="${WIREKUBE_INTERFACE:-wire_kube}"
              if ip link show "$IFACE" >/dev/null 2>&1; then
                echo "cleaning up stale $IFACE routes and interface"
                ip route flush dev "$IFACE" 2>/dev/null
                ip link delete "$IFACE"
              fi
              # Clean up stale ip rules from previous agent runs (crash/OOMKill)
              ip rule del prio 100 fwmark 0x574b 2>/dev/null || true
              ip rule del prio 200 table 22347 2>/dev/null || true
              ip route flush table 22347 2>/dev/null || true
          env:
            - name: WIREKUBE_INTERFACE
              value: "wire_kube"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            limits:
              cpu: 50m
              memory: 16Mi
      containers:
        - name: agent
          image: inerplat/wirekube:v0.0.0-dev.14
          command: ["wirekube-agent"]
          args:
            - --node-name=$(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WIREKUBE_INTERFACE
              value: "wire_kube"
            # Uncomment and set for EKS Hybrid Nodes:
            # - name: KUBERNETES_SERVICE_HOST
            #   value: "YOUR_EKS_API_ENDPOINT"
            # - name: KUBERNETES_SERVICE_PORT
            #   value: "443"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
          volumeMounts:
            - name: wireguard-keys
              mountPath: /var/lib/wirekube
            - name: host-proc-sys-net
              mountPath: /host/proc/sys/net
          resources:
            limits:
              cpu: 200m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: wireguard-keys
          hostPath:
            path: /var/lib/wirekube
            type: DirectoryOrCreate
        - name: host-proc-sys-net
          hostPath:
            path: /proc/sys/net
            type: Directory
