---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wg-bootstrap
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wg-bootstrap
rules:
  - apiGroups: ["wirekube.io"]
    resources: ["wirekubepeers"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["wirekube.io"]
    resources: ["wirekubemeshes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wg-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wg-bootstrap
subjects:
  - kind: ServiceAccount
    name: wg-bootstrap
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wg-bootstrap
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: wg-bootstrap
  template:
    metadata:
      labels:
        app: wg-bootstrap
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      serviceAccountName: wg-bootstrap
      volumes:
        - name: wireguard-dir
          hostPath:
            path: /var/lib/wirekube
            type: DirectoryOrCreate
        - name: net-dir
          hostPath:
            path: /run/wireguard
            type: DirectoryOrCreate
      containers:
        - name: agent
          image: alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache wireguard-tools curl iproute2 jq 2>/dev/null

              NODE=${NODE_NAME}
              APISERVER="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              # Generate WireGuard key (if not exists)
              if [ ! -f /wg/privatekey ]; then
                wg genkey > /wg/privatekey
                chmod 600 /wg/privatekey
              fi
              PRIVKEY=$(cat /wg/privatekey)
              PUBKEY=$(echo "$PRIVKEY" | wg pubkey)

              # Detect public IP (WireGuard endpoint)
              NODE_IP=$(curl -s --connect-timeout 5 https://checkip.amazonaws.com 2>/dev/null | tr -d '[:space:]')
              [ -z "$NODE_IP" ] && NODE_IP=$(ip route get 1.1.1.1 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src") print $(i+1)}')
              ENDPOINT="${NODE_IP}:51820"
              echo "[${NODE}] endpoint=${ENDPOINT} pub=${PUBKEY:0:12}..."

              # Create wg0 interface (if not exists)
              if ! ip link show wg0 > /dev/null 2>&1; then
                ip link add wg0 type wireguard
                ip link set wg0 up
              fi
              echo "$PRIVKEY" | wg set wg0 listen-port 51820 private-key /dev/stdin
              echo "[${NODE}] wg0 up"

              # Register WireKubePeer (create or patch)
              PEER_NAME="node-${NODE}"
              PEER_BODY=$(jq -n \
                --arg pub "$PUBKEY" \
                --arg ep "$ENDPOINT" \
                --arg node "$NODE" \
                --arg name "$PEER_NAME" \
                '{apiVersion:"wirekube.io/v1alpha1",kind:"WireKubePeer",metadata:{name:$name,labels:{"wirekube.io/node":$node}},spec:{publicKey:$pub,endpoint:$ep,persistentKeepalive:25}}')

              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST \
                "${APISERVER}/apis/wirekube.io/v1alpha1/wirekubepeers" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                --cacert "${CA}" \
                -d "${PEER_BODY}")

              if [ "$HTTP_CODE" = "409" ]; then
                curl -sk -X PATCH \
                  "${APISERVER}/apis/wirekube.io/v1alpha1/wirekubepeers/${PEER_NAME}" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/merge-patch+json" \
                  --cacert "${CA}" \
                  -d "{\"spec\":{\"publicKey\":\"${PUBKEY}\",\"endpoint\":\"${ENDPOINT}\"}}"
              fi
              echo "[${NODE}] WireKubePeer registration complete (HTTP ${HTTP_CODE})"

              # Main loop: sync peers every 30 seconds
              while true; do
                PEERS_JSON=$(curl -sk \
                  "${APISERVER}/apis/wirekube.io/v1alpha1/wirekubepeers" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  --cacert "${CA}" 2>/dev/null)

                # Exclude self, process only peers with allowedIPs
                echo "$PEERS_JSON" | jq -r --arg self "$PEER_NAME" \
                  '.items[] | select(.metadata.name != $self) | select((.spec.allowedIPs // []) | length > 0) | .metadata.name' \
                  | while read -r PNAME; do
                    PPUB=$(echo "$PEERS_JSON" | jq -r --arg n "$PNAME" '.items[] | select(.metadata.name==$n) | .spec.publicKey // empty')
                    PEND=$(echo "$PEERS_JSON" | jq -r --arg n "$PNAME" '.items[] | select(.metadata.name==$n) | .spec.endpoint // empty')
                    PIPS=$(echo "$PEERS_JSON" | jq -r --arg n "$PNAME" '.items[] | select(.metadata.name==$n) | .spec.allowedIPs // [] | join(",")')

                    [ -z "$PPUB" ] && continue
                    [ -z "$PIPS" ] && continue

                    wg set wg0 peer "$PPUB" \
                      allowed-ips "$PIPS" \
                      persistent-keepalive 25 2>/dev/null

                    if [ -n "$PEND" ]; then
                      wg set wg0 peer "$PPUB" endpoint "$PEND" 2>/dev/null
                    fi

                    # allowedIPs → kernel route
                    echo "$PIPS" | tr ',' '\n' | while read -r CIDR; do
                      [ -z "$CIDR" ] && continue
                      ip route replace "$CIDR" dev wg0 metric 200 2>/dev/null || true
                    done
                  done

                PEER_COUNT=$(wg show wg0 peers 2>/dev/null | wc -l)
                echo "[${NODE}] ${PEER_COUNT} peers synced"
                sleep 30
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
          volumeMounts:
            - name: wireguard-dir
              mountPath: /wg
            - name: net-dir
              mountPath: /run/wireguard
